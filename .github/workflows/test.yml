name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew test

      - name: Browser integration tests
        run: ./gradlew :server:browserTest

      - name: Agent integration tests
        run: ./gradlew :server:integrationTest -Dtest.acp.agent=github-copilot-cli
