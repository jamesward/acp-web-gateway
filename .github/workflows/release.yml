name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build-cli:
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
          - os: ubuntu-latest
            name: linux-amd64
          - os: windows-latest
            name: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      - uses: gradle/actions/setup-gradle@v5

      - name: Build CLI (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :cli:packageExecutable

      - name: Rename CLI artifact (Unix)
        if: runner.os != 'Windows'
        run: mv cli/build/dist/acp2web cli/build/dist/acp2web-${{ matrix.name }}

      - name: Upload CLI artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.name }}
          path: cli/build/dist/acp2web-${{ matrix.name }}

      - name: Build CLI (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew :cli:jpackageImage

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path cli/build/dist
          Compress-Archive -Path cli/build/jpackage/acp2web -DestinationPath cli/build/dist/acp2web-${{ matrix.name }}.zip

      - name: Upload CLI artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.name }}
          path: cli/build/dist/acp2web-${{ matrix.name }}.zip

  build-and-push-server:
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      - uses: gradle/actions/setup-gradle@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch base image
        uses: docker/build-push-action@v6
        with:
          context: server/base-image
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}-base:latest

      - name: Build and push multi-arch image
        run: |
          ./gradlew :server:jib \
            -Pjib.from.image=ghcr.io/${{ github.repository }}-base:latest \
            -Djib.to.image=ghcr.io/${{ github.repository }} \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [build-cli, build-and-push-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cli-macos-arm64/acp2web-macos-arm64
            artifacts/cli-linux-amd64/acp2web-linux-amd64
            artifacts/cli-windows-amd64/acp2web-windows-amd64.zip
