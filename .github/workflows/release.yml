name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build-cli:
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
          - os: ubuntu-latest
            name: linux-amd64
          - os: windows-latest
            name: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle
      - uses: gradle/actions/setup-gradle@v5

      - name: Build native CLI (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :cli:nativeCompile

      - name: Compress CLI with UPX (Linux only)
        if: runner.os == 'Linux'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: cli/build/native/nativeCompile/acp2web
          args: --best

      - name: Rename CLI artifact (Unix)
        if: runner.os != 'Windows'
        run: mv cli/build/native/nativeCompile/acp2web cli/build/native/nativeCompile/acp2web-${{ matrix.name }}

      - name: Upload CLI artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.name }}
          path: cli/build/native/nativeCompile/acp2web-${{ matrix.name }}

      - name: Build native CLI (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./gradlew :cli:nativeCompile

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path cli/build/native/nativeCompile/acp2web.exe -DestinationPath cli/build/native/nativeCompile/acp2web-${{ matrix.name }}.zip

      - name: Upload CLI artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.name }}
          path: cli/build/native/nativeCompile/acp2web-${{ matrix.name }}.zip

  build-and-push-server:
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      - uses: gradle/actions/setup-gradle@v5

      - name: Build and push multi-arch image
        run: |
          ./gradlew :server:jib \
            -Djib.to.image=ghcr.io/${{ github.repository }} \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [build-cli, build-and-push-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cli-macos-arm64/acp2web-macos-arm64
            artifacts/cli-linux-amd64/acp2web-linux-amd64
            artifacts/cli-windows-amd64/acp2web-windows-amd64.zip
